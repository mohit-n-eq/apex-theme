name: Build Validation

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate-build:
    name: Tailwind Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      
      - name: Check Tailwind Compilation
        run: npm run tailwind:build