name: Lint Check

on:
  pull_request:
    branches: [ "main" ]

jobs:
  eslint:
    name: JavaScript & Tailwind Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .